<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi | Langkah Pendaki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 md:p-12 rounded-3xl shadow-xl w-full max-w-md text-center border border-gray-100">
        
        <h1 class="text-4xl font-bold text-gray-900 mb-10">Registrasi</h1>

        <form id="registerForm" class="space-y-4">
            
            <div class="relative">
                <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                    <i class="fa-regular fa-user"></i>
                </span>
                <input type="text" id="username" placeholder="username" required 
                    class="w-full pl-12 pr-4 py-4 bg-white border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-400 transition">
            </div>

            <div class="relative">
                <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                    <i class="fa-regular fa-user"></i>
                </span>
                <input type="email" id="email" placeholder="Email" required 
                    class="w-full pl-12 pr-4 py-4 bg-white border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-400 transition">
            </div>

            <div class="relative">
                <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" id="password" placeholder="Password" required 
                    class="w-full pl-12 pr-4 py-4 bg-white border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-400 transition">
            </div>

            <div class="relative">
                <span class="absolute inset-y-0 left-4 flex items-center text-gray-400">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <input type="password" id="confirmPassword" placeholder="Konfirmasi password" required 
                    class="w-full pl-12 pr-4 py-4 bg-white border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-400 transition">
            </div>

            <button type="submit" 
                class="w-full bg-[#6eff6e] hover:bg-[#5ce65c] text-gray-800 font-bold py-4 rounded-xl shadow-lg flex items-center justify-center space-x-2 transition transform active:scale-95 mt-6">
                <span>Register</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <p class="mt-12 text-sm text-gray-500">
            Sudah punya akun? <a href="login.html" class="text-gray-900 font-bold hover:underline">Ayo login!</a>
        </p>
    </div>

</body>
</html>
