<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Interactive Catalog | Langkah Pendaki</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../public/assets/css/global.css">
    <link rel="stylesheet" href="../../public/assets/css/user.css">
</head>
<body class="bg-[#F7F8F5] text-[#2C3639] antialiased overflow-x-hidden opacity-100 transition-opacity duration-300">

    <div id="pageTransitionProgressBar" class="fixed top-0 left-0 h-0.5 bg-gradient-to-r from-[#D4A017] to-green-500 z-[99999] w-0 transition-all duration-300 ease-out"></div>

    <nav id="smartNavbar" class="fixed top-0 inset-x-0 z-50 bg-white/70 backdrop-blur-md text-stone-900 py-4 px-8 md:px-12 flex justify-between items-center transition-all duration-300 border-b border-stone-200/40">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.href='index.html'">
            <span class="text-2xl">🌿</span>
            <span class="font-serif text-xl font-bold tracking-wide">Langkah<span class="text-[#D4A017]">Pendaki</span></span>
        </div>
        
        <div class="flex items-center space-x-4">
            <div class="relative cursor-pointer p-2 bg-stone-100 hover:bg-stone-200 text-stone-800 rounded-xl transition" onclick="alert('Membuka halaman rincian keranjang belanja...')">
                <i class="fa-solid fa-basket-shopping text-xs"></i>
                <span id="navCartItemsCounterBadge" class="absolute -top-1 -right-1 bg-[#D4A017] text-stone-900 text-[9px] font-extrabold w-4 h-4 rounded-full flex items-center justify-center scale-100 transition-transform duration-300">0</span>
            </div>
            <a href="index.html" class="text-xs font-bold bg-stone-800 text-white hover:bg-stone-900 px-4 py-2 rounded-xl transition">Kembali ke Beranda</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-6 pt-24 pb-16 min-h-screen flex flex-col">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 pb-4 border-b border-stone-200/60">
            <div>
                <h1 class="font-serif text-2xl md:text-3xl font-bold text-stone-900">Premium Rental Catalog</h1>
                <p class="text-stone-500 text-xs">Aset terproteksi QR Code dengan jaminan sterilisasi dan uji kelayakan fisik.</p>
            </div>
            <div id="catalogTotalItemsBadge" class="bg-[#355E3B] text-white text-[10px] font-bold uppercase tracking-wider px-3 py-1.5 rounded-lg shadow-sm">
                Memuat Produk...
            </div>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-6 w-full">
            
            <div class="w-full max-w-md relative text-xs">
                <span class="absolute inset-y-0 left-3.5 flex items-center text-stone-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input type="text" id="catalogSmartSearchInput" placeholder="Cari tenda, carrier, atau gear outdoor..." class="w-full pl-10 pr-4 py-2.5 bg-white border border-stone-200 rounded-xl text-stone-800 placeholder-stone-400 outline-none focus:border-[#355E3B] focus:ring-2 focus:ring-green-100 transition-all duration-200 font-semibold shadow-sm">
                <div id="searchMatchCountText" class="absolute right-3.5 top-3 text-[10px] font-bold text-stone-400 uppercase tracking-wider hidden">0 Cocok</div>
            </div>

            <div class="w-full sm:w-auto relative text-xs font-semibold shrink-0">
                <select id="catalogSortDropdown" onchange="executeCombinedCatalogFilter()" class="w-full sm:w-48 pl-3 pr-8 py-2.5 bg-white border border-stone-200 rounded-xl text-stone-800 outline-none focus:border-[#355E3B] focus:ring-2 focus:ring-green-100 transition-all duration-200 shadow-sm cursor-pointer appearance-none font-semibold">
                    <option value="default">🔄 Urutkan: Default</option>
                    <option value="price-asc">📉 Harga: Termurah</option>
                    <option value="price-desc">📈 Harga: Termahal</option>
                    <option value="name-asc">🔤 Nama: A - Z</option>
                    <option value="name-desc">🔤 Nama: Z - A</option>
                    <option value="fav-desc">🔥 Terpopuler (Favorit)</option>
                </select>
                <span class="absolute inset-y-0 right-3.5 flex items-center text-stone-400 pointer-events-none">
                    <i class="fa-solid fa-chevron-down text-[10px]"></i>
                </span>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-6 items-start w-full text-xs font-semibold">
            
            <aside id="catalogFilterSidebar" class="w-full lg:w-64 bg-white p-5 rounded-xl border border-stone-200/60 shadow-sm space-y-5 shrink-0 transition-all duration-300">
                <div class="flex justify-between items-center border-b border-stone-100 pb-2">
                    <h3 class="font-serif text-sm font-bold text-stone-900 flex items-center gap-2">
                        <i class="fa-solid fa-sliders text-[#355E3B]"></i> Filter Pencarian
                    </h3>
                    <button onclick="resetAllCatalogFilters()" class="text-[10px] text-amber-600 hover:underline font-bold uppercase tracking-wider">Reset</button>
                </div>

                <div class="space-y-2">
                    <h4 class="text-[11px] uppercase tracking-wider text-stone-400 font-bold">Kategori Alat</h4>
                    <div class="space-y-1.5 font-medium text-stone-600">
                        <label class="flex items-center gap-2.5 cursor-pointer hover:text-stone-900">
                            <input type="checkbox" name="filterCategory" value="Tenda" onchange="executeCombinedCatalogFilter()" class="rounded border-stone-300 text-[#355E3B] focus:ring-green-100 w-3.5 h-3.5"> Tenda Dome
                        </label>
                        <label class="flex items-center gap-2.5 cursor-pointer hover:text-stone-900">
                            <input type="checkbox" name="filterCategory" value="Carrier" onchange="executeCombinedCatalogFilter()" class="rounded border-stone-300 text-[#355E3B] focus:ring-green-100 w-3.5 h-3.5"> Carrier Pack
                        </label>
                        <label class="flex items-center gap-2.5 cursor-pointer hover:text-stone-900">
                            <input type="checkbox" name="filterCategory" value="Gear" onchange="executeCombinedCatalogFilter()" class="rounded border-stone-300 text-[#355E3B] focus:ring-green-100 w-3.5 h-3.5"> Gear & Accessories
                        </label>
                    </div>
                </div>

                <div class="space-y-2 border-t border-stone-100 pt-3">
                    <div class="flex justify-between items-center">
                        <h4 class="text-[11px] uppercase tracking-wider text-stone-400 font-bold">Harga Maksimal</h4>
                        <span id="priceRangeLabel" class="text-green-700 font-bold text-[11px]">Rp 60.000</span>
                    </div>
                    <input type="range" id="filterPriceRange" min="5000" max="60000" step="5000" value="60000" oninput="updatePriceFilterLabel(this.value)" onchange="executeCombinedCatalogFilter()" class="w-full h-1 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-[#355E3B]">
                </div>
            </aside>

            <div id="premiumCardGridContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-3 gap-4 w-full">
                <div class="bg-white p-4 rounded-xl border border-stone-200/40 space-y-4 shadow-sm animate-pulse">
                    <div class="aspect-[4/3] bg-stone-200 rounded-lg w-full"></div>
                    <div class="h-4 bg-stone-200 rounded w-2/3"></div>
                    <div class="h-3 bg-stone-100 rounded w-1/3"></div>
                </div>
                <div class="bg-white p-4 rounded-xl border border-stone-200/40 space-y-4 shadow-sm animate-pulse">
                    <div class="aspect-[4/3] bg-stone-200 rounded-lg w-full"></div>
                    <div class="h-4 bg-stone-200 rounded w-2/3"></div>
                    <div class="h-3 bg-stone-100 rounded w-1/3"></div>
                </div>
            </div> 
        </div> 

        <div id="infiniteScrollTriggerAnchor" class="w-full h-12 flex items-center justify-center mt-6">
            <div id="infiniteScrollLoaderUi" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 w-full animate-pulse">
                <div class="bg-white p-4 rounded-xl border border-stone-200/40 space-y-2">
                    <div class="h-4 bg-stone-200 rounded w-2/3"></div>
                    <div class="h-3 bg-stone-100 rounded w-1/3"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-[#2C3639] text-white/60 py-6 text-center text-[11px] font-semibold border-t border-stone-800">
        &copy; 2026 Langkah Pendaki Service Network. All Rights Reserved.
    </footer>

    <div id="catalogQuickViewModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-all duration-300 ease-out text-xs font-semibold">
        <div class="bg-white rounded-2xl border border-stone-200/80 max-w-lg w-full p-6 shadow-2xl relative transform scale-95 transition-transform duration-300 ease-out space-y-4">
            <button onclick="closeQuickViewModalWindow()" class="absolute top-4 right-4 text-stone-400 hover:text-stone-800 transition text-sm active:scale-90 p-1">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="quickViewModalDynamicBody" class="space-y-4 text-left">
                </div>
        </div>
    </div>

    <script src="../../public/assets/js/user-core.js" type="module"></script>
    <script src="../../public/assets/js/catalog-interactive.js" type="module"></script>
</body>
</html>
